    { country: 'Spain', visa: 'Digital Nomad Visa', income: '\u20AC2,762/mo (200% min wage)', duration: 'Up to 5 years', tax: '24% flat tax (first 5 years vs 47% standard)', url: 'https://www.exteriores.gob.es/', note: 'Best tax deal in Western Europe for high earners.', summary: 'Launched January 2023 under Spain\u2019s Startup Act. Best Western European tax position: Beckham Law applies, giving a 24% flat rate on Spanish income for the first 5 years (vs. 47% standard top rate). Income requirement: \u20AC2,762/mo (200% of Spanish minimum wage). Apply IN Spain (enter on 90-day Schengen, submit application to UGE-CE for fast 20 working-day decision) OR at a Spanish consulate abroad (slower). Required: proof of remote employer registered 1+ year, university degree OR 3+ years professional experience, health insurance, clean criminal record. 3-year residence card initially, renewable for 2 more.' },

    { country: 'Italy', visa: 'Digital Nomad Visa', income: '\u20AC2,700/mo', duration: '1y renewable', tax: 'Standard Italian tax (high)', url: 'https://vistoperitalia.esteri.it/', note: 'Launched 2024. For skilled workers only.', summary: 'Launched April 2024. ONLY for "highly skilled" remote workers \u2014 typically requires university degree, 6 months of remote work history, or specific professional qualifications. Income requirement: \u20AC28,000/yr (\u20AC2,700/mo). Apply at Italian consulate abroad with proof of degree/qualification, employer letter or business documentation, clean criminal record, and Italian accommodation. Tax position is poor (standard Italian rates apply if resident 183+ days), so this is more for lifestyle than tax optimization. Process is bureaucracy-heavy \u2014 budget 2\u20134 months. 1-year visa renewable.' },
    { country: 'Cyprus', visa: 'Digital Nomad Visa', income: '\u20AC3,500/mo', duration: '1y + 2y renewal', tax: 'Non-dom regime (17 years zero tax on dividends/interest)', url: 'https://www.mfa.gov.cy/', note: 'EU but NOT Schengen \u2014 days don\u2019t count toward 90/180.', summary: 'Critical advantage: Cyprus is EU but NOT Schengen, so days here DON\u2019T count toward your 90/180 Schengen limit. Income requirement: \u20AC3,500/mo (couples: \u20AC4,200). Apply at Civil Registry & Migration Department in Cyprus (after entering on 90-day visa-free) OR at Cyprus consulate abroad. Non-dom tax regime is legendary: 17 years of ZERO tax on dividends and interest. Foreign-source income exempt if not tax resident (<183 days/yr). Limited to first 500 applicants per year initially \u2014 verify current cap. Renewable for 2 more years. English-speaking, Mediterranean climate.' },
    { country: 'Malta', visa: 'Nomad Residence Permit', income: '\u20AC3,500/mo', duration: '1 year, renewable to 3', tax: '10% flat on Maltese-source income (foreign income exempt)', url: 'https://nomad.residencymalta.gov.mt/', note: 'English-speaking, EU + Schengen.', summary: 'Malta\u2019s Nomad Residence Permit: \u20AC3,500/mo income, fully online application via Residency Malta Agency. Permit is 1 year initially, extendable in 3 stages up to 3 years total. Tax: 10% flat on Maltese-source income, FOREIGN INCOME EXEMPT if remitted to Malta (the "remittance basis"). English-speaking (Malta\u2019s official languages: Maltese + English), EU + Schengen member. Process is among the most foreigner-friendly in the EU \u2014 budget 2\u20133 months. Required: remote work proof, health insurance, clean criminal record, lease/property in Malta. Small island (Valletta + Sliema are nomad hubs).' },
    { country: 'Estonia', visa: 'Digital Nomad Visa', income: '\u20AC4,500/mo', duration: '12 months', tax: 'Standard rates apply if tax resident', url: 'https://www.politsei.ee/en/digital-nomad-visa', note: 'Pair with e-Residency for EU company formation.', summary: 'Europe\u2019s first dedicated digital nomad visa (2020). Income requirement: \u20AC4,500/mo (highest in EU). Apply at Estonian embassy abroad. 12-month permit, NOT renewable in-country. The killer feature: pair this with Estonia\u2019s e-Residency (separate, NOT a residence permit) to operate an EU-based company entirely online with 0% corporate tax until profits are distributed. Tallinn is one of Europe\u2019s top tech ecosystems. Required: proof of remote work, \u20AC4,500/mo income for 6+ months prior, health insurance, clean criminal record. Standard tax rates apply if you become tax resident (183+ days).' },
    { country: 'Hungary', visa: 'White Card', income: '\u20AC2,000/mo', duration: '1y + 1y renewal', tax: 'Flat 15% PIT (low for EU)', url: 'https://nemzetiportal.gov.hu/', note: 'Lowest income threshold in the EU.', summary: 'Hungary\u2019s "White Card" launched 2022. LOWEST income threshold in the EU: \u20AC2,000/mo. Apply at Hungarian consulate abroad. Tax: flat 15% personal income tax \u2014 among the lowest in the EU. 1-year initial card renewable for 1 more year. Process is straightforward: proof of remote work for foreign employer/clients, health insurance, clean criminal record, Hungarian address. Cannot bring family on White Card (apply separately). Budapest is the obvious base \u2014 affordable, EU + Schengen, fast internet, strong expat community. Note: Hungary is the cheapest EU entry but offers no direct path to permanent residency from this visa.' },
    { country: 'Romania', visa: 'Digital Nomad Visa', income: '\u20AC3,700/mo (3x avg wage)', duration: '1y + 1y renewal', tax: 'Exempt from local tax if not tax-resident', url: 'https://igi.mai.gov.ro/', note: 'EU but NOT Schengen until 2024 (now in). Cheap living.', summary: 'Romania\u2019s digital nomad visa: \u20AC3,700/mo income (3x average Romanian wage). Apply at Romanian consulate abroad with proof of foreign-employer or foreign-client work for 3+ years, health insurance, clean criminal record. Foreign income exempt if you don\u2019t become tax-resident (<183 days). 1-year visa renewable for 1 more. Romania joined Schengen in early 2024, so days now count toward your 90/180. Bucharest and Cluj-Napoca are the main bases \u2014 fast wifi, very low cost of living, growing tech scene. Note: visa application requires apostilled documents and police certificates from all countries you\u2019ve lived in for 6+ months.' },
    { country: 'UAE', visa: 'Virtual Working Programme', income: '$5,000/mo', duration: '1 year', tax: 'ZERO personal income tax', url: 'https://u.ae/en/information-and-services/visa-and-emirates-id/work-remotely-from-the-uae', note: 'Strongest tax-free option globally. Dubai/Abu Dhabi base.', summary: 'STRONGEST tax-free remote work option globally: ZERO UAE personal income tax. Income requirement: $5,000/mo. Apply ONLINE via the official UAE portal \u2014 fast 2-week processing. 1-year visa, renewable. Required: passport (6+ months validity), $5k income proof for last 3 months, health insurance covering UAE, employer letter or business documentation. Dubai is the obvious base (huge expat scene, fastest English-language nomad ecosystem) but Abu Dhabi is calmer and slightly cheaper. Note: Dubai is HOT (40\u00B0C+ May\u2013October) and expensive (rent \u20AC1,800\u20133,500/mo for a decent 1BR). Sharjah is the cheaper neighboring emirate. Bring family on dependent visas.' },

    { country: 'Costa Rica', visa: 'Digital Nomad Visa', income: '$3,000/mo', duration: '1y + 1y renewal', tax: 'Foreign income exempt', url: 'https://www.migracion.go.cr/', note: 'No tax on foreign-source income. Renewals straightforward.', summary: 'Costa Rica\u2019s digital nomad visa: $3,000/mo income ($4,000/mo for family). Apply ONLINE through Direcci\u00F3n General de Migraci\u00F3n. Tax: ZERO on foreign-source income for visa holders. 1-year permit, renewable for 1 more year. Required: bank statements showing 12 months of $3k+ income, health insurance covering Costa Rica, passport, no criminal record. Famous for "pura vida" lifestyle, surf coast (Tamarindo, Santa Teresa), cloud forests (Monteverde), strong nomad infrastructure in San Jos\u00E9 and beach towns. Internet is good (fiber widely available). Note: Costa Rica is significantly more expensive than other Central American countries \u2014 budget $1,800\u20133,000/mo for comfortable living.' },

    { country: 'Indonesia', visa: 'Second Home Visa (B211A)', income: '$130,000 in savings', duration: '5\u201310 years', tax: 'Worldwide income if tax resident', url: 'https://www.imigrasi.go.id/', note: 'Bali option. High savings requirement.', summary: 'Indonesia\u2019s "Second Home Visa" (announced 2022, refined since): $130,000 in savings (not monthly income \u2014 a one-time bank balance proof). 5\u201310 year stay. Bali is the obvious target (Canggu, Ubud have the biggest nomad scenes globally). Tax: worldwide income taxed if you become Indonesian tax resident (183+ days). Apply at Indonesian consulate abroad with bank statements showing $130k held for 6+ months, passport, health insurance. Note: many nomads in Bali still use 60-day visa-on-arrival + extensions or B211A short-term visit visa as alternatives \u2014 the Second Home Visa is for serious long-term basers. Reliable fiber in Bali (Canggu, Ubud), 4G/5G across most islands.' },
    { country: 'Japan', visa: 'Digital Nomad Visa', income: '\u00A510M/year (~\u20AC68k)', duration: '6 months (non-renewable)', tax: 'Foreign income not taxed for first 6 months', url: 'https://www.mofa.go.jp/', note: 'Short window. New as of 2024.', summary: 'Launched March 2024. Income requirement: \u00A510 million/year (~\u20AC68,000). 6-month stay, NON-RENEWABLE \u2014 you must leave and reapply with a 6-month gap. Foreign income NOT taxed during the 6-month window (you don\u2019t become tax resident). Apply at Japanese consulate abroad with proof of income, health insurance covering Japan, passport, employer letter. Only nationals of 49 designated countries qualify (Turkey IS on the list). Best bases: Tokyo (Shibuya, Roppongi for nomads), Osaka, Fukuoka. Fast internet, ultra-safe, but cost of living is significant (Tokyo 1BR \u20AC1,200\u20132,500/mo). Family members can join on dependent visas.' },
    { country: 'South Korea', visa: 'Workation Visa (F-1-D)', income: '~$66,000/yr', duration: '1y + 1y renewal', tax: 'Tax resident if 183+ days', url: 'https://www.hikorea.go.kr/', note: 'Strong fiber, low crime, Seoul base.', summary: 'South Korea\u2019s Workation Visa (F-1-D) launched January 2024. Income requirement: ~$66,000/year (twice South Korea\u2019s gross national income per capita). Apply at Korean consulate abroad. 1-year visa, renewable for 1 more year. Required: employer letter from foreign company, 1+ year remote work history, university degree or equivalent professional experience, health insurance $100k+ coverage, clean criminal record. Tax resident if 183+ days. Best bases: Seoul (Gangnam, Hongdae for nomads), Busan (coastal alternative). World\u2019s fastest fiber, ultra-low crime, but cost of living is significant (Seoul 1BR \u20AC900\u20131,800/mo). English is functional in Seoul but Korean helps.' },
    { country: 'Brazil', visa: 'Digital Nomad Visa', income: '$1,500/mo', duration: '1y + 1y renewal', tax: 'Standard rates if tax resident', url: 'https://www.gov.br/mre/', note: 'Low income bar. Beach + city options.', summary: 'Brazil\u2019s digital nomad visa: LOW $1,500/mo income bar (or $18,000 in savings). 1-year visa renewable for 1 more. Apply at Brazilian consulate abroad with proof of foreign-employer remote work or foreign clients, health insurance covering Brazil, clean criminal record. Tax: standard Brazilian rates apply if you become tax resident (183+ days). Foreign income subject to tax if resident. Best bases: Rio de Janeiro (Copacabana, Ipanema for nomads), S\u00E3o Paulo (largest tech scene), Florian\u00F3polis (cheaper, surf coast). Note: bureaucracy is slow, Portuguese fluency helps significantly for daily life, internet is good in major cities. Crime varies by neighborhood \u2014 do research.' },
    { country: 'Colombia', visa: 'Digital Nomad Visa (V Type)', income: '$750/mo (3x min wage)', duration: '2 years', tax: 'Foreign income exempt first 6 months', url: 'https://www.cancilleria.gov.co/', note: 'Lowest income threshold globally. Medell\u00EDn / Bogot\u00E1.', summary: 'LOWEST income threshold globally: $750/mo (3x Colombian minimum wage). Launched 2023. 2-year visa (one of the longer initial durations). Apply ONLINE through Colombia\u2019s consular portal. Foreign income exempt for first 6 months \u2014 standard rates after. Required: proof of remote work for foreign employer/clients, health insurance covering Colombia, clean criminal record. Best bases: Medell\u00EDn (largest nomad scene, El Poblado neighborhood, eternal spring weather), Bogot\u00E1 (cooler highland capital), Cartagena (Caribbean coast). Cost of living among the lowest globally for a major nomad destination. Note: Spanish helps significantly outside Medell\u00EDn\u2019s nomad bubble.' },
    { country: 'Argentina', visa: 'Digital Nomad Visa', income: '$2,500/mo', duration: '6mo + 6mo renewal', tax: 'Tax resident if 183+ days', url: 'https://www.migraciones.gov.ar/', note: 'Buenos Aires base. Inflation can favor USD earners.', summary: 'Argentina\u2019s digital nomad visa: $2,500/mo income proof. Initial 6-month visa, renewable for 6 more months (12 months total). Apply at Argentine consulate abroad OR online through DNM (Migraciones). Tax: resident if 183+ days. Buenos Aires is the obvious base \u2014 huge nomad scene in Palermo and Recoleta, strong cafe culture, robust fiber. KEY DYNAMIC: Argentina\u2019s currency has been volatile and inflation has been very high \u2014 USD/EUR earners get tremendous purchasing power but plan for currency complexity (Western Union and other parallel markets are common). Spanish helps significantly. Tango, parrilla, wine country (Mendoza), Patagonia are all 1\u20132 hour flights away.' },
    /* === EUROPE ADDITIONS === */
    { country: 'Germany', visa: 'Freelance Visa (Freiberufler)', income: 'No fixed minimum', duration: '3mo \u2192 3y residence', tax: 'Standard German tax if resident', url: 'https://www.auswaertiges-amt.de/', note: 'No income floor but must prove client demand. Berlin / Munich.', summary: 'Germany\u2019s Freiberufler (freelancer visa) has no fixed income floor but you MUST prove client demand. Submit a business plan showing German or international clients ready to engage you, your professional credentials, and financial projections. Apply at German consulate abroad with documentation, OR enter on Schengen and apply at local Ausl\u00E4nderbeh\u00F6rde within 90 days (Berlin is famously friendly to this approach). 3-month visa converts to 3-year residence permit after entry, with potential for permanent residency after. Required: degree or 5+ years experience, proof of pension provision OR strong income, health insurance, German address. Berlin and Munich are the strong bases.' },
    { country: 'Czech Republic', visa: 'Zivno (Trade License)', income: '~$1,670/mo', duration: '1y \u2192 renewable', tax: '15\u201323% flat (low for EU)', url: 'https://www.mvcr.cz/', note: 'Sole-trader route. Slovak \u017Eivnos\u0165 holders find it familiar.', summary: 'Czech Republic\u2019s Zivnostensky list ("Zivno") is a trade license + long-stay visa combo. Direct sister of the Slovak \u017Eivnos\u0165 system. Income requirement: ~$1,670/mo OR \u20AC130,000 in savings. Apply at Czech embassy abroad with apostilled trade-license application, business plan, accommodation proof, clean criminal record. Tax: 15% flat PIT + ~7% social contributions \u2014 among the lowest effective rates in the EU. 1-year visa, renewable. Prague is the main base (huge expat scene, strong fiber, walkable). Note: requires registering with a specific trade category from the Czech list \u2014 IT/consulting categories are easiest to qualify under.' },
    { country: 'Georgia', visa: 'Remotely from Georgia', income: 'No minimum required', duration: '1 year', tax: 'Foreign income exempt if not tax resident', url: 'https://stopcov.ge/', note: 'FREE. No fee, no income test. 10-day processing. Best value globally.', summary: 'EASIEST visa globally for many passports including Turkish: FREE, no fee, NO income test, 10-DAY processing. Apply ONLINE via the Georgian government portal. 1-year stay. Tax: foreign income exempt if you don\u2019t become tax resident (<183 days). Required: passport, basic application form, no criminal-record check for most nationalities. Tbilisi is the main base \u2014 fast fiber, very low cost of living (\u20AC400\u2013800/mo for a decent 1BR), strong nomad community, dramatic Caucasus mountain scenery. Note: many Turkish citizens can ALSO enter Georgia visa-free for 1 year (no formal nomad permit needed). Verify your passport\u2019s specific rules \u2014 the formal program is for nationalities that need a stay extension.' },
    { country: 'Norway', visa: 'Independent Contractor Visa', income: '\u20AC35,500/yr', duration: '2y \u2192 6y extendable', tax: 'Tax resident if 183+ days', url: 'https://www.udi.no/', note: 'Long horizon. Requires contract with Norway-based client.' , summary: 'Norway\u2019s Independent Contractor Visa is rare in that it offers a LONG initial duration: 2 years, extendable to 6 years total. Income requirement: \u20AC35,500/yr (NOK ~400,000). KEY REQUIREMENT: you must have a contract with at least one NORWAY-BASED client \u2014 this isn\u2019t a pure digital nomad visa for foreign-only income. Apply at Norwegian embassy/consulate abroad. Standard Norwegian tax rates apply if you become resident (183+ days) \u2014 these are high. Required: signed Norwegian contract, university degree or 3+ years relevant experience, health insurance, accommodation proof. Best bases: Oslo (most expensive Scandinavian capital), Bergen. Cost of living is extremely high \u2014 fits high earners with established Norwegian client base.' },
    { country: 'Iceland', visa: 'Long-term Remote Work Permit', income: '~\u20AC7,800/mo', duration: '6 months', tax: 'Exempt if not tax resident', url: 'https://www.workinginiceland.com/', note: 'High income bar. Short stay only.' , summary: 'HIGHEST income bar in Europe: ~\u20AC7,800/mo (ISK 1,000,000). Short 6-MONTH stay, non-renewable. Apply at Icelandic consulate abroad with proof of foreign employer/clients, income for last 6 months, health insurance covering Iceland, clean criminal record. Tax: exempt if you don\u2019t become tax resident (<183 days, easily met given short window). Reykjav\u00EDk is essentially the only realistic base. Cost of living is among the highest in Europe (1BR rentals \u20AC1,500\u20132,800/mo, restaurant meals \u20AC25\u201340). The draw: dramatic nature (glaciers, geysers, Northern Lights), ultra-low crime, near-universal English. Best for a focused short sabbatical project rather than long-term basing.' },
    { country: 'Latvia', visa: 'Digital Nomad Visa', income: '~$2,800/mo', duration: '1y + 1y renewal', tax: 'Standard rates if tax resident', url: 'https://www.pmlp.gov.lv/', note: 'OECD members only. Slovak Pobyt qualifies you.', summary: 'Latvia\u2019s DN visa launched 2022. Income requirement: ~$2,800/mo (2.5x average Latvian wage). RESTRICTION: applicant must be a citizen of an OECD member country \u2014 Slovak Pobyt holders qualify via Slovakia\u2019s OECD membership. Apply at Latvian consulate abroad. 1-year initial visa renewable for 1 more. Tax: standard Latvian rates apply if you become tax resident (183+ days) \u2014 Latvia has a progressive 20\u201331% personal income tax. Best base: Riga (Baltic capital with strong fiber, low cost of living relative to Western Europe, Schengen + EU member). Required: proof of remote employer/clients, health insurance, clean criminal record, accommodation proof.' },
    { country: 'Montenegro', visa: 'Digital Nomad Visa', income: '$2,500/mo', duration: '2 years', tax: 'Foreign income exempt', url: 'https://www.mup.gov.me/', note: '$100 fee. Balkans coast, EU candidate.', summary: 'Montenegro\u2019s DN visa launched 2022. Income requirement: $2,500/mo. $100 application fee. 2-year initial duration (one of the longest in the region). Tax: foreign income EXEMPT for visa holders. Montenegro is an EU candidate country (NOT yet a member, NOT Schengen \u2014 so days here don\u2019t count toward 90/180). Apply ONLINE through the Ministry of Interior portal. Required: proof of remote work, health insurance, clean criminal record, accommodation. Best bases: Budva (Adriatic coast, beach + bars), Kotor (UNESCO old town, bay views), Podgorica (capital, cheaper). Currency is the Euro (despite not being EU). Strong nomad infrastructure growing. Note: 8 hours from Vienna by car or 1.5hr flight.' },
    { country: 'Albania', visa: 'Unique Permit for Remote Workers', income: '$30,000/yr', duration: '1 year', tax: 'Foreign income exempt', url: 'https://e-albania.al/', note: 'Cheapest Mediterranean nomad base.', summary: 'Albania\u2019s "Unique Permit" includes remote workers. Income: $30,000/yr (~$2,500/mo). Apply ONLINE through e-Albania platform. 1-year permit, renewable. Tax: foreign income EXEMPT if not tax resident. Albania is NOT EU, NOT Schengen \u2014 days here don\u2019t count toward 90/180. CHEAPEST Mediterranean coast nomad base by a significant margin (1BR in Tirana \u20AC300\u2013500/mo, on the coast \u20AC400\u2013800/mo). Best bases: Tirana (capital, growing nomad scene), Sarand\u00EB (Riviera coast across from Corfu), Vlor\u00EB. Note: infrastructure is developing \u2014 fiber is in major cities but spotty in smaller towns. English widely understood in tourist areas. Required: remote work proof, health insurance, clean criminal record.' },
    { country: 'North Macedonia', visa: 'Digital Nomad Visa', income: '~$2,500/mo', duration: '1 year', tax: 'Standard rates if resident', url: 'https://www.mfa.gov.mk/', note: 'Low cost of living, Skopje base.', summary: 'North Macedonia\u2019s DN visa launched 2022. Income: ~$2,500/mo. 1-year visa, renewable. Apply at North Macedonian consulate abroad with remote work proof, health insurance, clean criminal record, accommodation in N. Macedonia. Tax: standard rates apply if you become tax resident (183+ days). NOT EU, NOT Schengen \u2014 days don\u2019t count toward 90/180. Skopje (capital) is the obvious base \u2014 affordable, growing tech scene, fiber widely available, walkable old town. Cost of living is among the lowest in Europe. Note: smaller nomad community than Serbia or Albania, but EU candidate status means infrastructure is improving rapidly. Bring patience for some old-school bureaucracy.' },
    /* === CARIBBEAN === */
    { country: 'Barbados', visa: 'Welcome Stamp', income: '$50,000/yr', duration: '1 year', tax: 'Zero local tax on foreign income', url: 'https://www.barbadoswelcomestamp.bb/', note: '$2,000 fee. 1-week processing. Iconic Caribbean program.', summary: 'Barbados\u2019 "Welcome Stamp" was the original pandemic-era Caribbean nomad visa (launched June 2020) and remains the iconic Caribbean DN program. Income: $50,000/yr ($75,000 with family). $2,000 application fee (steep but covers spouse + dependents). 1-week ONLINE processing. 1-year visa, renewable. Tax: ZERO Barbadian tax on foreign-source income. English-speaking, parliamentary democracy, very stable. Bridgetown is the main hub, but the entire south and west coast have decent nomad infrastructure. Required: passport, $50k income proof, health insurance, clean criminal record. Note: cost of living is high (1BR rentals $1,500\u20133,000/mo), groceries are expensive (much imported). Best for high earners wanting Caribbean lifestyle.' },
    { country: 'Antigua & Barbuda', visa: 'Nomad Digital Residence', income: '$50,000/yr', duration: '2 years', tax: 'Zero local tax on foreign income', url: 'https://nomaddigitalresidence.com/', note: 'Easy online application. Twin-island Caribbean.', summary: 'Antigua & Barbuda\u2019s "Nomad Digital Residence" launched 2020. Income: $50,000/yr. 2-year visa (one of the longest Caribbean durations). Application fee: $1,500 single, $2,000 couple, $3,000 family. Apply ONLINE via the official portal \u2014 typically 1\u20132 weeks. Tax: ZERO local tax on foreign-source income. English-speaking. Required: passport, income proof, health insurance, clean criminal record. St. John\u2019s (capital, Antigua\u2019s main town) is the working base \u2014 modest fiber, smaller nomad community than Barbados. Barbuda is much quieter and post-2017-hurricane reconstruction continues. Best for those wanting a calmer Caribbean than Barbados, with longer initial visa duration.' },
    { country: 'Bermuda', visa: 'Work From Bermuda', income: 'Self-supporting', duration: '1 year, renewable', tax: 'ZERO personal income tax', url: 'https://www.gov.bm/', note: 'British Overseas Territory. Top finance hub.', summary: 'Bermuda\u2019s "Work From Bermuda" certificate: no specific income floor, just "self-supporting" status. 1-year permit, renewable. $263 application fee. Apply ONLINE \u2014 fast processing (~5 business days). Tax: ZERO personal income tax (Bermuda has no income tax, no capital gains, no inheritance tax). British Overseas Territory. NOT Schengen. Required: proof of remote employment OR business ownership, health insurance, clean criminal record. Critical caveat: Bermuda is EXTREMELY expensive \u2014 1BR rentals $2,500\u20135,000/mo, restaurant meals $30\u201360, groceries 2\u20133x EU prices. Best for high earners wanting tax-free Caribbean/Atlantic basing. Fastest fiber in the Western Hemisphere. Global finance hub (insurance, reinsurance).' },
    { country: 'Bahamas', visa: 'BEATS Program', income: 'No fixed minimum', duration: '1 year, renewable to 3', tax: 'Zero personal income tax', url: 'https://www.bahamasbeats.com/', note: '$1,000 fee. Fast processing. Family included.', summary: 'Bahamas\u2019 BEATS (Bahamas Extended Access Travel Stay) program: no fixed income minimum, $1,000 application fee single ($500 for each dependent). 1-year permit, renewable up to 3 years. Apply ONLINE \u2014 fast processing. Tax: ZERO personal income tax in the Bahamas (no income tax, capital gains, or inheritance tax). Required: passport, "self-supporting" proof (bank statements typical), health insurance, clean criminal record. Nassau is the capital hub \u2014 fiber widely available. Outer islands (Exuma, Eleuthera) for quieter basing with decent connectivity. NOT Schengen. Cost of living is high but lower than Bermuda. Family included on a single application \u2014 strong family-friendly program.' },
    { country: 'Cura\u00E7ao', visa: '@HOME in Cura\u00E7ao', income: 'Self-supporting', duration: '6 months + 6mo', tax: 'Standard local tax if resident', url: 'https://www.curacao.com/', note: 'Dutch Caribbean. Easy online apply.', summary: 'Cura\u00E7ao\u2019s @HOME in Cura\u00E7ao program: no fixed income minimum (just "self-supporting"). 6-month initial stay, extendable for 6 more months. Apply ONLINE via the official portal. Dutch Caribbean (constituent country of the Kingdom of the Netherlands). Tax: standard local rates if you become resident, otherwise foreign income exempt during typical 6-month stay. Required: passport, accommodation proof, health insurance, clean criminal record. Willemstad is the main base (UNESCO old town, fiber widely available). Dutch and English widely spoken alongside Papiamento. NOT in the EU/Schengen despite Dutch ties. Cost of living moderate by Caribbean standards. Best for shorter Caribbean basers wanting Dutch infrastructure quality.' },
    { country: 'Dominica', visa: 'Work In Nature (WIN)', income: '$50,000/yr', duration: '18 months', tax: 'Zero local tax on foreign income', url: 'https://www.dominica.gov.dm/', note: 'Nature-focused, "Nature Island" branding.', summary: 'Dominica\u2019s "Work In Nature" (WIN) extended stay visa: $50,000/yr income, 18-month duration (longer than most Caribbean programs). Apply ONLINE through the official portal. Tax: ZERO local tax on foreign-source income. English-speaking. Required: passport, income proof, health insurance, clean criminal record. The pitch: Dominica markets itself as the "Nature Island" \u2014 dramatic rainforest, hot springs, hiking trails (Boiling Lake), Champagne Reef diving. NOT to be confused with the Dominican Republic (different country). Roseau is the capital and main base. Nomad infrastructure is modest \u2014 fiber works in towns but expect slower service than Barbados or Bermuda. Best for those wanting genuine off-grid Caribbean rather than a "nomad hub" experience.' },
    { country: 'Cayman Islands', visa: 'Global Citizen Concierge', income: '$100,000/yr (single)', duration: '2 years', tax: 'ZERO personal income tax', url: 'https://www.exploregov.ky/', note: 'High income bar but legendary tax position.', summary: 'Cayman Islands\u2019 "Global Citizen Concierge" program: HIGH income bar at $100,000/yr (single), $150,000/yr (family). $1,469 single application fee. 2-year permit. Apply ONLINE \u2014 fast 3\u20134 week processing. Tax: LEGENDARY ZERO personal income tax (no income tax, no capital gains, no inheritance, no corporate tax for many structures). British Overseas Territory. Required: passport, income proof for 12 months, health insurance covering Cayman, clean criminal record. Grand Cayman (Seven Mile Beach area) is the main nomad base. Cost of living is HIGH \u2014 1BR rentals $2,500\u20135,000/mo, groceries 2\u20133x EU prices. Best for high-earning consultants and remote workers wanting absolute zero tax with English-speaking infrastructure.' },
    /* === AMERICAS === */
    { country: 'Panama', visa: 'Short-Stay Remote Worker', income: '$36,000/yr', duration: '9mo + 9mo', tax: 'Territorial \u2014 foreign income exempt', url: 'https://www.migracion.gob.pa/', note: 'Friendly Nations Visa is another path with permanent residency option.', summary: 'Panama\u2019s Short-Stay Remote Worker visa: $36,000/yr income proof. 9-month visa renewable for 9 more (18 months total). Apply ONLINE OR at Panamanian consulate abroad. Tax: TERRITORIAL system \u2014 foreign-source income is NOT taxed by Panama (only Panama-source income is). Required: remote work proof, health insurance, clean criminal record, accommodation. Panama City is the main base \u2014 strong infrastructure (it\u2019s a regional banking hub), fiber widely available, the canal is on your doorstep. SEPARATE option: Friendly Nations Visa offers a direct path to permanent residency for citizens of 50 designated countries (Turkey is on the list) \u2014 if you want longer-term Panama, that\u2019s often a stronger structure.' },
    { country: 'Ecuador', visa: 'Rentista Visa', income: '~$1,300/mo', duration: '2 years', tax: 'Standard rates if resident', url: 'https://www.cancilleria.gob.ec/', note: 'Among the cheapest. Quito + coast options.', summary: 'Ecuador\u2019s Rentista Visa (technically a "passive income" visa but used by digital nomads): low ~$1,300/mo income proof (3x Ecuadorian minimum wage). 2-year visa. Apply at Ecuadorian consulate abroad OR after entering Ecuador. Tax: standard rates apply if you become tax resident (183+ days), but foreign-source income enjoys substantial exemptions. Among the CHEAPEST nomad-friendly Latin American countries (1BR rentals $300\u2013700/mo, restaurant meals $5\u201312). Quito (high-altitude capital) and Cuenca (popular expat retirement city) are the main highland bases. The coast (Manta, Salinas) is hotter but cheaper. Currency: US Dollar \u2014 no FX risk. Note: Spanish helps significantly outside expat enclaves.' },
    { country: 'Belize', visa: 'Work Where You Vacation', income: '$75,000/yr', duration: '6 months', tax: 'Zero local tax on foreign income', url: 'https://www.travelbelize.org/', note: 'English-speaking, Caribbean coast.', summary: 'Belize\u2019s "Work Where You Vacation" program: $75,000/yr income (highest income bar in the cheap Latin America cluster). 6-month visa. Apply ONLINE. Tax: ZERO local tax on foreign-source income. ENGLISH IS THE OFFICIAL LANGUAGE \u2014 rare in Latin America. Caribbean coast + Mayan ruins + reef diving. Required: passport, income proof, health insurance, clean criminal record. Best bases: San Pedro (Ambergris Caye island, ferry-connected, strong tourism), Placencia (mainland coast, quieter), Belize City (capital but generally avoided by nomads). Cost of living is HIGHER than other Central American countries (1BR rentals $700\u20131,500/mo, meals $8\u201320). Fiber works in main towns. Note: Belize Barrier Reef is the world\u2019s second largest after Australia\u2019s.' },
    /* === ASIA & OCEANIA === */
    { country: 'Malaysia', visa: 'DE Rantau Nomad Pass', income: '$24,000/yr (~$2,000/mo)', duration: '1y + 1y renewal', tax: 'Foreign income exempt', url: 'https://mdec.my/derantau/', note: 'Penang + KL hubs. English widely spoken. Low cost.', summary: 'Malaysia\u2019s DE Rantau Nomad Pass launched October 2022. Income: $24,000/yr (~$2,000/mo). 1-year visa, renewable for 1 more. Apply ONLINE via MDEC (Malaysia Digital Economy Corporation) portal. Fast processing (~2 weeks). Tax: FOREIGN INCOME EXEMPT. ENGLISH widely spoken across Malaysia (former British colony). Required: remote employer letter OR business documentation, health insurance, clean criminal record. Best bases: Kuala Lumpur (capital, biggest nomad scene, strong fiber, Bukit Bintang nomad area), Penang (Georgetown UNESCO old town, calmer, food capital of Southeast Asia). Cost of living is LOW (1BR rentals \u20AC400\u2013900/mo, meals \u20AC2\u20136). Family included. Note: Malaysia\u2019s mix of Malay, Chinese, Indian, and Western cultures makes it one of Asia\u2019s most foreigner-friendly bases.' },
    { country: 'Taiwan', visa: 'Employment Gold Card', income: '~$5,700/mo', duration: '1\u20133 years', tax: 'Tax incentive: 50% income exempt for first 5 years', url: 'https://goldcard.nat.gov.tw/', note: 'Combined work permit + residence + visa. Strong tech scene.', summary: 'Taiwan\u2019s Employment Gold Card is a HYBRID program: combined work permit + residence visa + multiple-entry visa in one card. NOT a pure DN visa but functions similarly. Income: ~$5,700/mo for last 6 months (NTD 160,000/mo), OR equivalent qualification under 8 specialized categories (tech, finance, science, etc.). 1\u20133 year duration. Apply ONLINE via the Taiwan portal. Tax INCENTIVE: 50% of income EXEMPT for first 5 years if you qualify as "foreign special professional". Strong tech scene (TSMC headquarters, semiconductor and AI cluster). Best bases: Taipei (capital, fiber speeds among world\u2019s best, calm and safe), Taichung, Tainan. Required: degree + 5+ years experience, OR specialized qualification, OR demonstrated income. Spouse and children can join.' },
    { country: 'Sri Lanka', visa: 'Digital Nomad Visa', income: '$2,000/mo', duration: '1 year', tax: 'Foreign income exempt', url: 'https://www.immigration.gov.lk/', note: 'New 2024 program. Beach + tea hill country.', summary: 'Sri Lanka\u2019s DN visa launched 2024. Income: $2,000/mo. 1-year visa. Apply at Sri Lankan consulate abroad. Tax: foreign-source income EXEMPT. Required: remote work proof, health insurance, clean criminal record, Sri Lankan accommodation. Best bases: Colombo (capital, growing nomad scene, strong fiber), Galle (UNESCO Dutch colonial fort, surf coast), Ella (hill country, tea plantations, slower pace). English widely spoken (legacy of British colonial rule + tourism). Cost of living is LOW (1BR rentals $300\u2013700/mo, meals $3\u20138). Tropical with monsoons (different seasons for the south vs. east coast \u2014 plan accordingly). Note: country was recovering from 2022 economic crisis \u2014 verify current banking/forex practicality.' },
    { country: 'Philippines', visa: 'Digital Nomad Visa', income: '$24,000/yr', duration: '1y + 1y renewal', tax: 'Foreign income exempt', url: 'https://immigration.gov.ph/', note: 'Launched 2024. English-speaking, beach + city.', summary: 'Philippines\u2019 DN visa launched 2024 (one of the newest worldwide programs). Income: $24,000/yr. 1-year visa, renewable for 1 more. Apply at Philippine consulate abroad. Tax: FOREIGN-SOURCE INCOME EXEMPT. ENGLISH is widely spoken (one of two official languages alongside Filipino). Required: remote work proof, health insurance, clean criminal record. Best bases: Manila (capital, biggest tech scene, BGC neighborhood for nomads), Cebu (beach + city), Siargao (surf island), El Nido / Coron (postcard beach islands). 7,000+ islands. Internet is decent in major cities but spotty on smaller islands. Cost of living is LOW (1BR rentals $400\u20131,000/mo, meals $3\u20138). Family included on dependent visas.' },
    /* === MIDDLE EAST & AFRICA === */
    { country: 'Egypt', visa: 'Digital Nomad Visa', income: '~$2,000/mo', duration: '1 year', tax: 'Foreign income exempt', url: 'https://www.moi.gov.eg/', note: 'Launched 2024. Cairo + Red Sea coast access.', summary: 'Egypt\u2019s DN visa launched 2024. Income: ~$2,000/mo. 1-year visa. Apply at Egyptian consulate abroad. Tax: foreign-source income EXEMPT. Required: remote work proof, health insurance, clean criminal record. Best bases: Cairo (megalopolis 22M, nomad scene in Zamalek and Maadi neighborhoods, fiber widely available), Hurghada / Sharm El-Sheikh (Red Sea, diving), Dahab (the world freediving capital, smaller scene). Cost of living is LOW (Cairo 1BR rentals $250\u2013700/mo, meals $3\u20137). Note: 5,000 years of history (pyramids, Luxor, Alexandria) on your doorstep. Turkish citizens get visa on arrival for tourist stays, so the DN visa is the formal pathway for longer remote work basing. Bureaucracy can be slow \u2014 budget 2\u20133 months.' },
